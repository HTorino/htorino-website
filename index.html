<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>HTorino</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
background:#0E0E0E;
font-family:sans-serif;
}

/* logo */

.logo{
width:200px;
}

/* social icons container */

.socials{
margin-top:18px;
display:flex;
gap:12px;
}

/* social icons */

.socials img{
width:22px;
opacity:0.9;
transition:opacity 0.2s ease, transform 0.2s ease;
}

/* hover */

.socials img:hover{
opacity:1;
transform:scale(1.08);
}

</style>

</head>

<body>

<img src="logo.png" class="logo" alt="HTorino">

<div class="socials">

<a href="https://open.spotify.com/playlist/5209QTHpYltiKwKntXbq2B?si=4477fa7bc3144442" target="_blank">
<img src="spotify-official.png" alt="Spotify">
</a>

<a href="https://www.instagram.com/hotel_torino" target="_blank">
<img src="instagram-official.png" alt="Instagram">
</a>

</div>

</body>
</html>
