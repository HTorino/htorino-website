<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTorino</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
background:#0E0E0E;
font-family:sans-serif;
}

.logo{
width:200px;
}

.socials{
margin-top:18px;
display:flex;
gap:12px;
}

.socials img{
width:22px;
opacity:0.9;
transition:opacity 0.2s ease, transform 0.2s ease;
}

.socials img:hover{
opacity:1;
transform:scale(1.08);
}

/* mobile only */
@media (max-width: 768px){
.logo{
width:200px;
}

.socials{
margin-top:24px;
gap:16px;
}

.socials img{
width:28px;
}
}

.db4logo{
height:22px;
filter:invert(1);
}
  
</style>


  
</head>

<body>

<img src="logo.png" class="logo" alt="HTorino">

<div class="socials">
<a href="https://open.spotify.com/playlist/5209QTHpYltiKwKntXbq2B?si=4477fa7bc3144442" target="_blank" rel="noopener noreferrer">
<img src="spotify-official.png" alt="Spotify">
</a>

<a href="https://www.instagram.com/hotel_torino" target="_blank" rel="noopener noreferrer">
<img src="instagram-official.png" alt="Instagram">
</a>
</div>

</body>
</html>
