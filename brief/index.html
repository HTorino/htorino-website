<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTorino Brief</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #0E0E0E;
      color: #FFFFFF;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 720px;
      background: #151515;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 40px 28px;
      text-align: center;
    }
    .logo {
      width: 120px;
      max-width: 100%;
      margin-bottom: 24px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 32px;
      font-weight: 400;
    }
    p {
      margin: 0 auto 28px;
      max-width: 560px;
      color: rgba(255,255,255,0.78);
      line-height: 1.6;
      font-size: 16px;
    }
    .buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    button {
      background: #C9A96E;
      color: #0E0E0E;
      border: none;
      border-radius: 999px;
      padding: 14px 22px;
      font-size: 15px;
      cursor: pointer;
      font-weight: 600;
    }
    .note {
      font-size: 14px;
      color: rgba(255,255,255,0.58);
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="/logo.png" alt="HTorino" class="logo" />
    <h1>Songwriting Brief Portal</h1>
    <p>
      This is the first production version of our artist brief portal.
      The full multi-step form will be added here next.
    </p>
    <div class="buttons">
      <button>English</button>
      <button>Polski</button>
    </div>
    <div class="note">Next step: replacing this with the full native brief form.</div>
  </div>
</body>
</html>
